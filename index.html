<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Exam Select | Centro Cultural Norteamericano</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="container nav-container">
            <div class="logo"><img src="img/CCCNlogo.png" alt=""></div>
            <nav>
                <ul class="nav-links">
                    <li><a href="#" class="nav-btn">Inicio</a></li>
                    <li><a href="#" class="nav-btn">Cursos</a></li>
                    <li><a href="#" class="nav-btn active">Selección de Examen</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="container text-center">
                <h1>Easy Exam Select</h1>
                <p>Encuentra y matricula el programa o examen de certificación de manera rápida, sencilla y segura.</p>
            </div>
        </section>

        <section class="selection-area">
            <div class="container">
                <div class="filters">
                    <button class="filter-btn active" data-filter="todos">Todos</button>
                    <button class="filter-btn" data-filter="toeic">TOEIC</button>
                    <button class="filter-btn" data-filter="toefl">TOEFL</button>
                    <button class="filter-btn" data-filter="michigan">Michigan / MET</button>
                </div>

                <div class="exam-grid" id="examGrid">
                    </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container text-center">
            <p>&copy; 2026 Centro Cultural Costarricense Norteamericano. Todos los derechos reservados.
TOEIC® y TOEFL® son marcas registradas de ETS®.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
