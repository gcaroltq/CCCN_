<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Exam Select | Centro Cultural Norteamericano</title>

    <!-- Google Fonts Raleway -->
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tu CSS -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="navbar">
        <div class="container nav-container">
            <div><img class="logoheader" src="img/Pa╠ügina web TOEIC Y TOEFL_Marca del Header.png" alt=""></div>
            <nav>
                <ul class="nav-links">
                    <li><a href="#" class="nav-btn">Inicio</a></li>
                    <li><a href="#" class="nav-btn">Cursos</a></li>
                    <li><a href="#" class="nav-btn active">Selección de Examen</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <section class="hero">
            <div class="hero-copy"><h1 class="titul">Pruebas internacionales</h1></div>
            <img class="img-hero" src="img/Pa╠ügina web TOEIC Y TOEFL_Hero Background.png" alt="Imagen de fondo">
        </section>

        <section class="selection-area">
            <div class="container">
                <div class="filters">
                    <button class="filter-btn active" data-filter="todos">Todos</button>
                    <button class="filter-btn" data-filter="toeic">TOEIC</button>
                    <button class="filter-btn" data-filter="toefl">TOEFL</button>
                    <button class="filter-btn" data-filter="michigan">Michigan / MET</button>
                </div>

                <div class="exam-grid" id="examGrid">
                </div>
            </div>
        </section>
    </main>

    <footer>

TOEIC® y TOEFL® son marcas registradas de ETS®.</p>

    <script src="script.js"></script>
